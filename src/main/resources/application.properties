spring.application.name=first-expense-tracker

# JSP mapping
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Keep Spring from trying to use Thymeleaf templates
spring.thymeleaf.enabled=false

# Server
server.port=${PORT:8080}

# MySQL (your DBConnection currently hardcodes URL/user/pass; these are defaults)
# You can optionally override DBConnection later.
spring.datasource.url=jdbc:mysql://localhost:3306/prakhar
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Logging
logging.level.org.springframework=INFO

